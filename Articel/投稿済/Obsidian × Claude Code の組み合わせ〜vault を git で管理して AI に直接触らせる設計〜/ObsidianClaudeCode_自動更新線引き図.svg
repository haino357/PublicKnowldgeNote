<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">自動更新と手動維持の線引き</title>
  <desc id="desc">業務情報は鮮度重視で自動更新提案し、個人メモや日次記録は記録性重視で手動維持する判断図</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 48px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .sub { font: 500 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .head { font: 700 34px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #111827; letter-spacing: 0; }
      .label { font: 700 23px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #111827; letter-spacing: 0; }
      .text { font: 500 20px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .strong { font: 800 24px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #dbe3ef; stroke-width: 2; filter: url(#shadow); }
      .row { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text x="90" y="92" class="title">何を自動更新し、何を手動で残すか</text>
  <text x="90" y="132" class="sub">鮮度が必要な情報と、当時の判断を残す情報を分ける。</text>

  <g transform="translate(105 210)">
    <rect class="panel" x="0" y="0" width="660" height="585" rx="30"/>
    <rect x="0" y="0" width="660" height="92" rx="30" fill="#dcfce7"/>
    <text x="42" y="59" class="head">自動更新提案に向く</text>
    <circle cx="585" cy="46" r="25" fill="#22c55e"/>
    <path d="M572 47 L582 58 L600 35" stroke="#ffffff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <rect class="row" x="42" y="130" width="576" height="92" rx="18"/>
    <text x="72" y="166" class="label">対象</text>
    <text x="72" y="198" class="text">業務ルール、案件情報、手順書、技術wiki</text>

    <rect class="row" x="42" y="252" width="576" height="92" rx="18"/>
    <text x="72" y="288" class="label">理由</text>
    <text x="72" y="320" class="text">古いままだと実害が出る。鮮度が価値になる。</text>

    <rect class="row" x="42" y="374" width="576" height="92" rx="18"/>
    <text x="72" y="410" class="label">AIの役割</text>
    <text x="72" y="442" class="text">差分検知、修正候補、リンク・タグ提案</text>

    <text x="42" y="530" class="strong">例: wiki / projects</text>
  </g>

  <g transform="translate(835 210)">
    <rect class="panel" x="0" y="0" width="660" height="585" rx="30"/>
    <rect x="0" y="0" width="660" height="92" rx="30" fill="#fee2e2"/>
    <text x="42" y="59" class="head">手動維持にする</text>
    <circle cx="585" cy="46" r="25" fill="#ef4444"/>
    <path d="M572 34 L598 60 M598 34 L572 60" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

    <rect class="row" x="42" y="130" width="576" height="92" rx="18"/>
    <text x="72" y="166" class="label">対象</text>
    <text x="72" y="198" class="text">日次記録、個人メモ、判断ログ、感情の記録</text>

    <rect class="row" x="42" y="252" width="576" height="92" rx="18"/>
    <text x="72" y="288" class="label">理由</text>
    <text x="72" y="320" class="text">当時の思考を残すこと自体に価値がある。</text>

    <rect class="row" x="42" y="374" width="576" height="92" rx="18"/>
    <text x="72" y="410" class="label">AIの役割</text>
    <text x="72" y="442" class="text">追記候補、関連リンク、振り返り補助に限定</text>

    <text x="42" y="530" class="strong">例: 001.Daily / 個人ノート</text>
  </g>

  <g transform="translate(320 820)">
    <text class="sub">判断基準: 「最新であること」が大事ならAI更新提案。「その時そう考えたこと」が大事なら手動維持。</text>
  </g>
</svg>
