<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">情報を溜めるシステムから鮮度を保つシステムへ</title>
  <desc id="desc">ObsidianとClaude Codeによって、保存中心のノート管理から鮮度を保つ運用へ変換するまとめ図</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2 2 L12 7 L2 12 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 48px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .sub { font: 500 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .head { font: 800 34px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #111827; letter-spacing: 0; }
      .label { font: 700 23px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #111827; letter-spacing: 0; }
      .text { font: 500 20px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 2; filter: url(#shadow); }
      .arrow { stroke: #334155; stroke-width: 6; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .pill { font: 700 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #334155; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text x="90" y="92" class="title">情報を溜めるシステムから、鮮度を保つシステムへ</text>
  <text x="90" y="132" class="sub">Obsidianに保存し、Claude Codeが差分・リンク・更新候補を見つける。</text>

  <g transform="translate(130 245)">
    <rect class="card" x="0" y="0" width="500" height="430" rx="30"/>
    <rect x="42" y="54" width="130" height="170" rx="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3"/>
    <rect x="196" y="82" width="130" height="170" rx="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3"/>
    <rect x="350" y="110" width="90" height="142" rx="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3"/>
    <path d="M70 100 H145 M70 132 H130 M70 164 H150" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
    <path d="M224 128 H299 M224 160 H278 M224 192 H304" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
    <text x="42" y="315" class="head">溜めるだけ</text>
    <text x="42" y="360" class="text">ノートは増えるが、古い情報・重複・孤立が混在する。</text>
  </g>

  <path class="arrow" d="M685 462 H900"/>
  <g transform="translate(700 380)">
    <rect x="0" y="0" width="180" height="64" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="36" y="41" class="pill">AIが点検</text>
  </g>

  <g transform="translate(970 245)">
    <rect class="card" x="0" y="0" width="500" height="430" rx="30"/>
    <circle cx="135" cy="118" r="46" fill="#7c3aed"/>
    <circle cx="250" cy="92" r="46" fill="#22c55e"/>
    <circle cx="365" cy="145" r="46" fill="#f97316"/>
    <circle cx="238" cy="220" r="46" fill="#0ea5e9"/>
    <path d="M178 109 L207 98 M292 109 L323 130 M210 195 L166 144 M275 202 L334 164" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
    <text x="42" y="315" class="head">使える状態を保つ</text>
    <text x="42" y="360" class="text">関連リンク、更新候補、古い情報をAIが見つける。</text>
  </g>

  <g transform="translate(235 725)">
    <rect x="0" y="0" width="1130" height="82" rx="24" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="34" y="36" class="label">運用の結論</text>
    <text x="34" y="65" class="text">人間が書き、AIがつながりと鮮度を見張る。これがObsidian × Claude Codeの強み。</text>
  </g>
</svg>
