<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">slash commandsの日次フロー</title>
  <desc id="desc">start、sort、done、lint、stageのslash commandsを日次運用の中に並べたワークフロー図</desc>
  <defs>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M2 2 L11 6.5 L2 11 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 48px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .sub { font: 500 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .cmd { font: 800 31px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; letter-spacing: 0; }
      .label { font: 700 23px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #111827; letter-spacing: 0; }
      .text { font: 500 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 2; filter: url(#shadow); }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .time { font: 700 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #64748b; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text x="90" y="92" class="title">slash commandsで日常操作を統一</text>
  <text x="90" y="132" class="sub">Obsidianの作業を、会話ではなく再利用できる操作単位にする。</text>

  <line x1="180" y1="445" x2="1420" y2="445" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>

  <g transform="translate(110 250)">
    <rect class="card" x="0" y="0" width="260" height="260" rx="26"/>
    <circle cx="130" cy="70" r="34" fill="#fef3c7"/>
    <path d="M130 48 V92 M108 70 H152" stroke="#d97706" stroke-width="8" stroke-linecap="round"/>
    <text x="52" y="140" class="cmd">/start</text>
    <text x="68" y="183" class="label">始業</text>
    <text x="32" y="220" class="text">日次ノート・繰り越し</text>
    <text x="32" y="246" class="text">優先度つきIssueを確認</text>
  </g>

  <g transform="translate(420 250)">
    <rect class="card" x="0" y="0" width="260" height="260" rx="26"/>
    <circle cx="130" cy="70" r="34" fill="#dbeafe"/>
    <path d="M108 65 H152 M108 82 H138 M108 99 H152" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
    <text x="62" y="140" class="cmd">/sort</text>
    <text x="66" y="183" class="label">随時</text>
    <text x="32" y="220" class="text">inboxを読み分類先を</text>
    <text x="32" y="246" class="text">AIが提案する</text>
  </g>

  <g transform="translate(730 250)">
    <rect class="card" x="0" y="0" width="260" height="260" rx="26"/>
    <circle cx="130" cy="70" r="34" fill="#dcfce7"/>
    <path d="M108 72 L124 88 L154 52" stroke="#16a34a" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="60" y="140" class="cmd">/done</text>
    <text x="58" y="183" class="label">終業前</text>
    <text x="32" y="220" class="text">会話から今日やったことを</text>
    <text x="32" y="246" class="text">日次ノートへ追記候補化</text>
  </g>

  <g transform="translate(1040 250)">
    <rect class="card" x="0" y="0" width="260" height="260" rx="26"/>
    <circle cx="130" cy="70" r="34" fill="#fae8ff"/>
    <path d="M110 92 L128 50 L150 92 Z M119 83 H141" stroke="#a21caf" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="66" y="140" class="cmd">/lint</text>
    <text x="46" y="183" class="label">定期点検</text>
    <text x="32" y="220" class="text">古いページ・壊れたリンク</text>
    <text x="32" y="246" class="text">frontmatter欠損を検出</text>
  </g>

  <g transform="translate(590 610)">
    <rect class="card" x="0" y="0" width="420" height="150" rx="26"/>
    <text x="48" y="62" class="cmd">/stage</text>
    <text x="48" y="103" class="label">コミット前</text>
    <text x="210" y="86" class="text">ステージングと</text>
    <text x="210" y="114" class="text">コミットメッセージ案</text>
  </g>

  <path class="arrow" d="M370 380 H410"/>
  <path class="arrow" d="M680 380 H720"/>
  <path class="arrow" d="M990 380 H1030"/>
  <path class="arrow" d="M860 520 C860 570 800 595 800 600"/>

  <text x="152" y="560" class="time">朝</text>
  <text x="462" y="560" class="time">作業中</text>
  <text x="760" y="560" class="time">終業前</text>
  <text x="1082" y="560" class="time">週次・必要時</text>
</svg>
