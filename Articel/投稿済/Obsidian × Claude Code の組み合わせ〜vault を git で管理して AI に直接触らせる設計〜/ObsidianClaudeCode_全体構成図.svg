<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Obsidian vaultの全体構成図</title>
  <desc id="desc">raw、Daily、inbox、wiki、output、Work、archiveを分離し、Claude Codeがルールに従って扱う構成図</desc>
  <defs>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M2 2 L11 6.5 L2 11 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 48px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .sub { font: 500 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .box-title { font: 700 26px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #111827; letter-spacing: 0; }
      .box-text { font: 500 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .lane { font: 700 20px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #334155; letter-spacing: 0; }
      .box { fill: #ffffff; stroke: #dbe3ef; stroke-width: 2; filter: url(#shadow); }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .dashed { stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text x="92" y="92" class="title">vault全体構成</text>
  <text x="92" y="132" class="sub">原典・受信箱・wiki・完成品・アーカイブを分離し、情報の混在を防ぐ</text>

  <rect x="90" y="180" width="1420" height="630" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="125" y="232" class="lane">Obsidian vault = Git repository</text>

  <g transform="translate(130 285)">
    <rect class="box" x="0" y="0" width="290" height="120" rx="20"/>
    <rect x="0" y="0" width="290" height="12" rx="6" fill="#ef4444"/>
    <text x="24" y="48" class="box-title">000.raw</text>
    <text x="24" y="82" class="box-text">外部原典の不変保管庫</text>
    <text x="24" y="108" class="box-text">Claude Codeは読むだけ</text>
  </g>

  <g transform="translate(130 465)">
    <rect class="box" x="0" y="0" width="290" height="120" rx="20"/>
    <rect x="0" y="0" width="290" height="12" rx="6" fill="#f59e0b"/>
    <text x="24" y="48" class="box-title">100.inbox</text>
    <text x="24" y="82" class="box-text">未仕分けの一時バッファ</text>
    <text x="24" y="108" class="box-text">分類候補をAIが提案</text>
  </g>

  <g transform="translate(130 645)">
    <rect class="box" x="0" y="0" width="290" height="120" rx="20"/>
    <rect x="0" y="0" width="290" height="12" rx="6" fill="#0ea5e9"/>
    <text x="24" y="48" class="box-title">001.Daily</text>
    <text x="24" y="82" class="box-text">日次記録</text>
    <text x="24" y="108" class="box-text">append-onlyで扱う</text>
  </g>

  <g transform="translate(650 405)">
    <rect class="box" x="0" y="0" width="300" height="170" rx="24"/>
    <rect x="0" y="0" width="300" height="14" rx="7" fill="#22c55e"/>
    <text x="34" y="64" class="box-title">110.wiki</text>
    <text x="34" y="100" class="box-text">生きた知識ベース</text>
    <text x="34" y="128" class="box-text">要約・手順・業務知識</text>
  </g>

  <g transform="translate(1180 285)">
    <rect class="box" x="0" y="0" width="290" height="120" rx="20"/>
    <rect x="0" y="0" width="290" height="12" rx="6" fill="#8b5cf6"/>
    <text x="24" y="48" class="box-title">120.output</text>
    <text x="24" y="82" class="box-text">完成品・納品物</text>
    <text x="24" y="108" class="box-text">人間が責任を持つ</text>
  </g>

  <g transform="translate(1180 465)">
    <rect class="box" x="0" y="0" width="290" height="120" rx="20"/>
    <rect x="0" y="0" width="290" height="12" rx="6" fill="#64748b"/>
    <text x="24" y="48" class="box-title">200.projects</text>
    <text x="24" y="82" class="box-text">プロジェクト資料</text>
    <text x="24" y="108" class="box-text">参照・整形補助</text>
  </g>

  <g transform="translate(1180 645)">
    <rect class="box" x="0" y="0" width="290" height="120" rx="20"/>
    <rect x="0" y="0" width="290" height="12" rx="6" fill="#111827"/>
    <text x="24" y="48" class="box-title">999.archive</text>
    <text x="24" y="82" class="box-text">完了・廃止の凍結保管</text>
    <text x="24" y="108" class="box-text">query対象から除外</text>
  </g>

  <path class="arrow" d="M420 345 C510 345 560 410 640 455"/>
  <path class="arrow" d="M420 525 C500 525 560 505 640 493"/>
  <path class="arrow dashed" d="M420 705 C515 700 565 570 640 532"/>
  <path class="arrow" d="M950 465 C1030 410 1090 355 1170 345"/>
  <path class="arrow" d="M950 500 C1035 505 1090 520 1170 525"/>
  <path class="arrow" d="M950 535 C1035 590 1090 680 1170 705"/>

  <g transform="translate(585 720)">
    <rect x="0" y="0" width="430" height="62" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="30" y="40" class="sub">Claude Codeはルールに従って直接操作</text>
  </g>
</svg>
