<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Obsidian Web Clipper連携図</title>
  <desc id="desc">ブラウザ記事をWeb Clipperでrawに保存し、Claude Codeが読むだけでwikiに反映する流れ</desc>
  <defs>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M2 2 L11 6.5 L2 11 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 48px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .sub { font: 500 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .label { font: 700 27px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #111827; letter-spacing: 0; }
      .text { font: 500 19px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #475569; letter-spacing: 0; }
      .note { font: 700 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #b91c1c; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 2; filter: url(#shadow); }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .readonly { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text x="90" y="92" class="title">Web Clipper連携</text>
  <text x="90" y="132" class="sub">原典は保護し、Claude Codeは読むだけ。整理された知識だけをwikiへ反映する。</text>

  <g transform="translate(95 275)">
    <rect class="card" x="0" y="0" width="250" height="240" rx="24"/>
    <rect x="38" y="48" width="174" height="112" rx="16" fill="#eff6ff" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="66" cy="78" r="8" fill="#ef4444"/>
    <circle cx="92" cy="78" r="8" fill="#f59e0b"/>
    <circle cx="118" cy="78" r="8" fill="#22c55e"/>
    <path d="M65 118 H185 M65 145 H154" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
    <text x="45" y="205" class="label">ブラウザ記事</text>
  </g>

  <g transform="translate(430 275)">
    <rect class="card" x="0" y="0" width="250" height="240" rx="24"/>
    <rect x="68" y="54" width="114" height="130" rx="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/>
    <path d="M91 95 H159 M91 125 H159 M91 155 H138" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
    <text x="41" y="205" class="label">Web Clipper</text>
  </g>

  <g transform="translate(765 245)">
    <rect class="card" x="0" y="0" width="290" height="300" rx="24"/>
    <rect x="34" y="44" width="222" height="148" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
    <path d="M76 92 H212 M76 125 H190 M76 158 H226" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
    <rect class="readonly" x="54" y="213" width="182" height="46" rx="14"/>
    <text x="91" y="244" class="note">読み取り専用</text>
    <text x="54" y="52" class="label" transform="translate(0 178)">000.raw</text>
    <text x="54" y="287" class="text">clipsに保存</text>
  </g>

  <g transform="translate(1140 275)">
    <rect class="card" x="0" y="0" width="250" height="240" rx="24"/>
    <circle cx="92" cy="88" r="40" fill="#10b981"/>
    <path d="M70 93 C84 58 116 63 115 91 C114 119 82 121 70 93 Z" fill="#ffffff"/>
    <text x="44" y="175" class="label">Claude Code</text>
    <text x="54" y="210" class="text">原典を読んで整理</text>
  </g>

  <g transform="translate(765 650)">
    <rect class="card" x="0" y="0" width="290" height="130" rx="24"/>
    <rect x="32" y="32" width="62" height="62" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
    <path d="M48 63 H78 M63 48 V78" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/>
    <text x="116" y="58" class="label">110.wiki</text>
    <text x="116" y="91" class="text">要約・手順・知識へ</text>
  </g>

  <path class="arrow" d="M355 395 H420"/>
  <path class="arrow" d="M690 395 H755"/>
  <path class="arrow" d="M1065 395 H1130"/>
  <path class="arrow" d="M1265 525 C1220 620 1120 705 1065 714"/>

  <g transform="translate(122 665)">
    <rect x="0" y="0" width="520" height="88" rx="22" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text x="28" y="36" class="label">設計の要点</text>
    <text x="28" y="68" class="text">原典は変えない。使う知識だけをwikiへ抽出する。</text>
  </g>
</svg>
